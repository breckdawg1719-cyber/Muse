<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Muse</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html {
  --bg:#0c0c0c; --sf:#161616; --sf2:#1e1e1e; --sf3:#252525;
  --ln:#232323; --ln2:#2d2d2d;
  --tx:#f0f0f0; --tx2:#777; --tx3:#333;
  --fn:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;
  --r:6px;
}
html.light {
  --bg:#f9f9f9; --sf:#f1f1f1; --sf2:#e9e9e9; --sf3:#e0e0e0;
  --ln:#e2e2e2; --ln2:#d2d2d2;
  --tx:#111; --tx2:#888; --tx3:#ccc;
}
body { font-family:var(--fn); background:var(--bg); color:var(--tx); height:100vh; display:flex; flex-direction:column; overflow:hidden; -webkit-font-smoothing:antialiased; }

/* ── Layout ── */
.shell { display:flex; flex:1; min-height:0; }
.side  { width:200px; border-right:1px solid var(--ln); display:flex; flex-direction:column; flex-shrink:0; }
.main  { flex:1; display:flex; flex-direction:column; min-width:0; overflow:hidden; }
.scroll { flex:1; overflow-y:auto; padding:0; }
.scroll::-webkit-scrollbar { width:0; }
.pad { padding:28px 32px; }

/* ── Sidebar ── */
.brand { padding:18px 16px 14px; border-bottom:1px solid var(--ln); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.brand-left { display:flex; flex-direction:column; }
.brand-name { font-size:15px; font-weight:600; letter-spacing:-.5px; }
.brand-ver  { font-size:10px; color:var(--tx3); margin-top:2px; }
.brand-dot  { width:7px; height:7px; border-radius:50%; background:#ff453a; transition:background .3s; flex-shrink:0; }
.brand-dot.ok { background:#30d158; }
.nav { padding:12px 8px; flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:18px; }
.nav::-webkit-scrollbar { width:0; }
.ngrp { display:flex; flex-direction:column; gap:1px; }
.nlbl { font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--tx3); padding:0 10px 7px; display:flex; justify-content:space-between; align-items:center; }
.nlbl button { background:none; border:none; color:var(--tx3); font-size:20px; line-height:1; cursor:pointer; }
.nlbl button:hover { color:var(--tx); }
.nitem { display:block; width:100%; text-align:left; background:none; border:none; color:var(--tx2); font-family:var(--fn); font-size:13px; padding:6px 10px; border-radius:5px; cursor:pointer; transition:color .1s,background .1s; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.nitem:hover  { color:var(--tx); background:var(--sf); }
.nitem.active { color:var(--tx); font-weight:500; background:var(--sf); }

/* ── Topbar ── */
.topbar { height:52px; border-bottom:1px solid var(--ln); display:flex; align-items:center; padding:0 20px; gap:8px; flex-shrink:0; }
.search-form { display:flex; flex:1; max-width:440px; position:relative; }
.search-input { flex:1; background:var(--sf); border:1px solid var(--ln2); border-right:none; border-radius:var(--r) 0 0 var(--r); padding:7px 12px; color:var(--tx); font-family:var(--fn); font-size:13px; outline:none; transition:border-color .15s; }
.search-input::placeholder { color:var(--tx3); }
.search-input:focus { border-color:var(--tx2); }
.search-go { background:var(--tx); border:1px solid var(--tx); border-radius:0 var(--r) var(--r) 0; padding:7px 14px; color:var(--bg); font-family:var(--fn); font-size:13px; cursor:pointer; }
.search-go:hover { opacity:.82; }
.ac { position:absolute; top:calc(100% + 4px); left:0; right:0; background:var(--sf2); border:1px solid var(--ln2); border-radius:var(--r); overflow:hidden; z-index:30; box-shadow:0 8px 24px rgba(0,0,0,.5); display:none; }
.ac.show { display:block; }
.ac-item { padding:9px 14px; font-size:13px; color:var(--tx2); cursor:pointer; }
.ac-item:hover { background:var(--sf); color:var(--tx); }
.filter-tabs { display:flex; gap:2px; background:var(--sf); border:1px solid var(--ln2); border-radius:var(--r); padding:2px; }
.ftab { background:none; border:none; font-family:var(--fn); font-size:11.5px; color:var(--tx2); padding:4px 9px; border-radius:4px; cursor:pointer; transition:all .12s; white-space:nowrap; }
.ftab.on { background:var(--tx); color:var(--bg); font-weight:500; }
.ftab:not(.on):hover { color:var(--tx); }
.tbtn { background:none; border:1px solid var(--ln2); border-radius:var(--r); padding:6px 12px; color:var(--tx2); font-family:var(--fn); font-size:12px; cursor:pointer; transition:all .12s; white-space:nowrap; }
.tbtn:hover { color:var(--tx); border-color:var(--tx2); }
.user-btn { display:flex; align-items:center; gap:6px; background:none; border:1px solid var(--ln2); border-radius:var(--r); padding:5px 10px; color:var(--tx2); font-family:var(--fn); font-size:12px; cursor:pointer; transition:all .12s; white-space:nowrap; }
.user-btn:hover { color:var(--tx); border-color:var(--tx2); }
.user-avatar { width:20px; height:20px; border-radius:50%; background:var(--sf2); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:600; color:var(--tx); }

/* ── Section header ── */
.sh { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:20px; }
.st { font-size:18px; font-weight:600; letter-spacing:-.5px; }
.sm { font-size:12px; color:var(--tx2); }

/* ── Grid ── */
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(148px,1fr)); gap:16px; }
.gcard { cursor:pointer; user-select:none; }
.gcard:hover .gcname { color:var(--tx2); }
.gcart { width:100%; aspect-ratio:1; background:var(--sf); border-radius:4px; overflow:hidden; border:1px solid var(--ln); display:flex; align-items:center; justify-content:center; margin-bottom:9px; position:relative; }
.gcart.round { border-radius:50%; }
.gcart img { width:100%; height:100%; object-fit:cover; display:block; }
.gcph { width:30%; height:30%; background:var(--ln2); border-radius:3px; }
.gcrank { position:absolute; top:6px; left:6px; background:rgba(0,0,0,.78); color:#fff; font-size:11px; font-weight:700; border-radius:4px; padding:2px 6px; line-height:1.4; }
.gcname   { font-size:13px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; transition:color .12s; margin-bottom:2px; }
.gcartist { font-size:12px; color:var(--tx2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

/* ── Track list ── */
.tlist { border-top:1px solid var(--ln); }
.trow { display:grid; grid-template-columns:40px 42px 1fr 68px; align-items:center; height:56px; border-bottom:1px solid var(--ln); cursor:pointer; transition:background .1s; user-select:none; }
.trow:hover { background:var(--sf); }
.trow.now   { background:var(--sf); }
.tidx { font-size:12px; color:var(--tx2); text-align:center; font-variant-numeric:tabular-nums; }
.trow.now .tidx { display:none; }
.twave { display:none; justify-content:center; align-items:center; gap:2px; }
.trow.now .twave { display:flex; }
.wb { width:2px; background:var(--tx); border-radius:1px; animation:wv .9s ease-in-out infinite; }
.wb:nth-child(1){height:8px;animation-delay:0s}.wb:nth-child(2){height:13px;animation-delay:.15s}.wb:nth-child(3){height:9px;animation-delay:.3s}.wb:nth-child(4){height:5px;animation-delay:.45s}
@keyframes wv{0%,100%{transform:scaleY(.5)}50%{transform:scaleY(1)}}
.tart { width:36px; height:36px; background:var(--sf); border-radius:3px; overflow:hidden; border:1px solid var(--ln); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.tart img { width:100%; height:100%; object-fit:cover; display:block; }
.tartph { width:12px; height:12px; background:var(--ln2); border-radius:2px; }
.tinfo { min-width:0; padding:0 12px; }
.tname   { font-size:13.5px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.tartist { font-size:12px; color:var(--tx2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:1px; }
.tdur { font-size:12px; color:var(--tx2); text-align:right; padding-right:16px; font-variant-numeric:tabular-nums; }

/* ── Artist page ── */
.artist-hero {
  height:280px; position:relative; overflow:hidden;
  display:flex; align-items:flex-end;
  flex-shrink:0;
}
.artist-hero-bg {
  position:absolute; inset:0;
  background-size:cover; background-position:center top;
  filter:blur(2px) brightness(.5); transform:scale(1.05);
}
.artist-hero-overlay {
  position:absolute; inset:0;
  background:linear-gradient(to top, rgba(12,12,12,.98) 0%, rgba(12,12,12,.4) 60%, transparent 100%);
}
html.light .artist-hero-overlay {
  background:linear-gradient(to top, rgba(249,249,249,.98) 0%, rgba(249,249,249,.4) 60%, transparent 100%);
}
.artist-hero-info {
  position:relative; z-index:2; padding:24px 32px;
  display:flex; align-items:flex-end; gap:20px; width:100%;
}
.artist-avatar {
  width:96px; height:96px; border-radius:50%;
  overflow:hidden; flex-shrink:0;
  border:2px solid rgba(255,255,255,.15);
  background:var(--sf);
}
.artist-avatar img { width:100%; height:100%; object-fit:cover; display:block; }
.artist-meta { min-width:0; }
.artist-label { font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--tx2); margin-bottom:6px; }
.artist-name  { font-size:32px; font-weight:700; letter-spacing:-.8px; line-height:1.1; margin-bottom:6px; }
.artist-subs  { font-size:13px; color:var(--tx2); }
.artist-btns  { display:flex; gap:8px; margin-top:14px; }
.artist-body  { padding:28px 32px; }
.artist-section { margin-bottom:32px; }

/* Albums grid */
.album-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:14px; }
.album-card { cursor:pointer; }
.album-card:hover .gcname { color:var(--tx2); }
.album-art { width:100%; aspect-ratio:1; border-radius:4px; overflow:hidden; background:var(--sf); border:1px solid var(--ln); margin-bottom:8px; display:flex; align-items:center; justify-content:center; }
.album-art img { width:100%; height:100%; object-fit:cover; display:block; }
.album-title { font-size:12.5px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:2px; }
.album-year  { font-size:11.5px; color:var(--tx2); }

/* Related artists */
.related-grid { display:flex; gap:14px; overflow-x:auto; padding-bottom:4px; }
.related-grid::-webkit-scrollbar { height:0; }
.rel-card { cursor:pointer; flex-shrink:0; width:110px; text-align:center; }
.rel-art { width:80px; height:80px; border-radius:50%; overflow:hidden; background:var(--sf); border:1px solid var(--ln); margin:0 auto 8px; }
.rel-art img { width:100%; height:100%; object-fit:cover; display:block; }
.rel-name { font-size:12px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

/* ── Context menu ── */
.ctx-menu { position:fixed; z-index:200; background:var(--sf2); border:1px solid var(--ln2); border-radius:8px; padding:4px; min-width:180px; box-shadow:0 12px 32px rgba(0,0,0,.6); display:none; }
.ctx-menu.show { display:block; }
.ctx-item { padding:9px 14px; font-size:13px; color:var(--tx2); cursor:pointer; border-radius:5px; transition:background .1s; display:flex; align-items:center; gap:10px; }
.ctx-item:hover { background:var(--sf); color:var(--tx); }
.ctx-sep { height:1px; background:var(--ln); margin:4px 0; }
.ctx-title { padding:6px 14px 2px; font-size:10px; letter-spacing:.07em; text-transform:uppercase; color:var(--tx3); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:180px; }
.ctx-sub { position:relative; }
.ctx-sub-menu { position:absolute; left:100%; top:-4px; background:var(--sf2); border:1px solid var(--ln2); border-radius:8px; padding:4px; min-width:160px; box-shadow:0 12px 32px rgba(0,0,0,.6); display:none; }
.ctx-sub:hover .ctx-sub-menu { display:block; }

/* ── Queue ── */
.queue-panel { width:256px; border-left:1px solid var(--ln); display:flex; flex-direction:column; flex-shrink:0; overflow:hidden; transition:width .2s; }
.queue-panel.hidden { width:0; border-left:none; }
.qhead { padding:12px 14px 10px; font-size:11px; font-weight:600; letter-spacing:.07em; text-transform:uppercase; color:var(--tx2); border-bottom:1px solid var(--ln); flex-shrink:0; display:flex; justify-content:space-between; align-items:center; }
.qclear { background:none; border:none; font-family:var(--fn); font-size:11px; color:var(--tx3); cursor:pointer; }
.qclear:hover { color:var(--tx); }
.qlist { flex:1; overflow-y:auto; }
.qlist::-webkit-scrollbar { width:0; }
.qitem { display:flex; align-items:center; gap:10px; padding:8px 14px; cursor:pointer; transition:background .1s; border-bottom:1px solid var(--ln); }
.qitem:hover { background:var(--sf); }
.qitem.now   { background:var(--sf); }
.qart { width:32px; height:32px; border-radius:3px; background:var(--sf2); border:1px solid var(--ln); overflow:hidden; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
.qart img { width:100%; height:100%; object-fit:cover; display:block; }
.qaph { width:9px; height:9px; background:var(--ln2); border-radius:2px; }
.qinfo { min-width:0; }
.qtitle  { font-size:12px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.qartist { font-size:11px; color:var(--tx2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:1px; }

/* ── States ── */
.empty { display:flex; flex-direction:column; align-items:center; padding:72px 20px; gap:8px; text-align:center; }
.empty-t { font-size:15px; font-weight:500; color:var(--tx2); }
.empty-s { font-size:13px; color:var(--tx2); opacity:.55; max-width:320px; line-height:1.6; }
.ld { padding:28px 32px; display:flex; align-items:center; gap:10px; color:var(--tx2); font-size:13px; }
.spin { width:14px; height:14px; border:1.5px solid var(--ln2); border-top-color:var(--tx); border-radius:50%; animation:sp .7s linear infinite; flex-shrink:0; }
@keyframes sp{to{transform:rotate(360deg)}}
.pname-loading { opacity:.5; font-style:italic; }

/* ── Auth modal ── */
.ov { position:fixed; inset:0; background:rgba(0,0,0,.7); display:flex; align-items:center; justify-content:center; z-index:100; backdrop-filter:blur(4px); }
.mod { background:var(--bg); border:1px solid var(--ln2); border-radius:12px; padding:28px; width:340px; }
.mod h2 { font-size:18px; font-weight:600; margin-bottom:4px; }
.mod .mod-sub { font-size:13px; color:var(--tx2); margin-bottom:20px; }
.mod-field { margin-bottom:12px; }
.mod-label { font-size:11.5px; color:var(--tx2); margin-bottom:5px; display:block; }
.mod-input { width:100%; background:var(--sf); border:1px solid var(--ln2); border-radius:var(--r); padding:9px 12px; color:var(--tx); font-family:var(--fn); font-size:13px; outline:none; transition:border-color .15s; }
.mod-input:focus { border-color:var(--tx2); }
.mod-err { font-size:12.5px; color:#ff453a; margin-bottom:12px; min-height:18px; }
.mod-btns { display:flex; gap:8px; justify-content:flex-end; margin-top:8px; }
.btn { background:none; border:1px solid var(--ln2); border-radius:var(--r); padding:8px 16px; color:var(--tx2); font-family:var(--fn); font-size:12.5px; cursor:pointer; transition:all .12s; }
.btn:hover { color:var(--tx); border-color:var(--tx2); }
.btn.p { background:var(--tx); color:var(--bg); border-color:var(--tx); font-weight:500; }
.btn.p:hover { opacity:.82; }
.mod-switch { font-size:12.5px; color:var(--tx2); text-align:center; margin-top:14px; }
.mod-switch a { color:var(--tx); cursor:pointer; text-decoration:underline; }

/* Playlist modal */
.pl-picker { display:flex; flex-direction:column; gap:5px; max-height:180px; overflow-y:auto; margin-bottom:12px; }
.pl-pick { padding:8px 10px; border:1px solid var(--ln); border-radius:var(--r); cursor:pointer; font-size:13px; color:var(--tx2); transition:all .12s; }
.pl-pick:hover { border-color:var(--tx2); color:var(--tx); }

/* ── Server banner ── */
.server-banner { background:var(--sf); border:1px solid var(--ln2); border-radius:8px; padding:20px 22px; margin:28px 32px; }
.sb-title { font-size:14px; font-weight:600; margin-bottom:8px; }
.sb-body  { font-size:13px; color:var(--tx2); line-height:1.75; }
.sb-body code { font-family:'SF Mono','Fira Code',monospace; font-size:12px; background:var(--sf2); padding:1px 6px; border-radius:4px; color:var(--tx); }

/* ── Player ── */
.player { height:74px; border-top:1px solid var(--ln); display:flex; align-items:center; padding:0 20px; gap:16px; flex-shrink:0; }
.part { width:42px; height:42px; border-radius:3px; background:var(--sf); border:1px solid var(--ln); flex-shrink:0; overflow:hidden; display:flex; align-items:center; justify-content:center; }
.part img { width:100%; height:100%; object-fit:cover; display:block; }
.partph { width:11px; height:11px; background:var(--ln2); border-radius:2px; }
.pinfo { flex:0 0 155px; min-width:0; }
.pname   { font-size:13px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.partist { font-size:11.5px; color:var(--tx2); margin-top:2px; }
.pctrl { flex:1; display:flex; flex-direction:column; align-items:center; gap:7px; }
.pbtns { display:flex; align-items:center; gap:6px; }
.pbtn { background:none; border:1px solid transparent; color:var(--tx2); cursor:pointer; padding:5px 6px; display:flex; align-items:center; border-radius:5px; transition:color .12s,background .12s,border-color .12s; }
.pbtn:hover { color:var(--tx); }
.pbtn.on { color:var(--tx); background:var(--sf2); border-color:var(--ln2); }
.pplay { width:33px; height:33px; border-radius:50%; background:var(--tx); border:none; color:var(--bg); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:opacity .12s; flex-shrink:0; }
.pplay:hover { opacity:.8; }
.pprog { width:100%; max-width:480px; display:flex; align-items:center; gap:9px; }
.ptime { font-size:11px; color:var(--tx2); font-variant-numeric:tabular-nums; min-width:30px; }
.pbar  { flex:1; height:16px; display:flex; align-items:center; cursor:pointer; position:relative; user-select:none; }
.pbar-track { position:absolute; left:0; right:0; height:2px; background:var(--ln2); border-radius:1px; pointer-events:none; }
.pbar-fill  { position:absolute; left:0; height:2px; background:var(--tx); border-radius:1px; pointer-events:none; }
.vrow  { flex:0 0 120px; display:flex; align-items:center; gap:8px; }
.vico  { color:var(--tx3); flex-shrink:0; cursor:pointer; transition:color .12s; }
.vico:hover { color:var(--tx); }
.vbar  { flex:1; height:16px; display:flex; align-items:center; cursor:pointer; position:relative; user-select:none; }
.vbar-track { position:absolute; left:0; right:0; height:2px; background:var(--ln2); border-radius:1px; pointer-events:none; }
.vbar-fill  { position:absolute; left:0; height:2px; background:var(--tx2); border-radius:1px; pointer-events:none; }

/* ── Toast ── */
.toast { position:fixed; bottom:86px; left:50%; transform:translateX(-50%); background:var(--tx); color:var(--bg); border-radius:20px; padding:8px 18px; font-size:12px; font-weight:500; z-index:300; pointer-events:none; animation:ti .2s ease; white-space:nowrap; }
@keyframes ti{from{opacity:0;transform:translateX(-50%) translateY(6px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ── Playlist cover ── */
.pl-symbol { width:100%; height:100%; display:flex; align-items:center; justify-content:center; background:var(--sf2); }
.pl-symbol svg { opacity:.3; }
.plhd { display:flex; align-items:flex-end; gap:20px; padding-bottom:24px; border-bottom:1px solid var(--ln); }
.plcover { width:96px; height:96px; border-radius:4px; background:var(--sf); border:1px solid var(--ln); flex-shrink:0; overflow:hidden; display:flex; align-items:center; justify-content:center; }
.plcover img { width:100%; height:100%; object-fit:cover; }
.pllabel { font-size:10px; letter-spacing:.07em; text-transform:uppercase; color:var(--tx2); margin-bottom:5px; }
.plbig   { font-size:21px; font-weight:600; letter-spacing:-.4px; margin-bottom:3px; }
.plct    { font-size:12.5px; color:var(--tx2); margin-bottom:12px; }
.plbtns  { display:flex; gap:8px; }
</style>
</head>
<body>
<div id="root"></div>
<audio id="globalAudio" preload="auto"></audio>
<div class="ctx-menu" id="ctxMenu">
  <div class="ctx-title" id="ctxTitle"></div>
  <div class="ctx-item" onclick="ctxPlay()"><svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>Play now</div>
  <div class="ctx-item" onclick="ctxPlayNext()"><svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm10-12v12h2V6h-2z"/></svg>Play next</div>
  <div class="ctx-item" onclick="ctxAddQueue()"><svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M3 18h12v-2H3v2zm0-5h12v-2H3v2zm0-7v2h12V6H3zm14 9.67V14h-2v7l6-3.5-4-2.83z"/></svg>Add to queue</div>
  <div class="ctx-item" onclick="ctxSave()"><svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M17 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z"/></svg>Save to library</div>
  <div class="ctx-sep"></div>
  <div class="ctx-sub">
    <div class="ctx-item"><svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 10h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/></svg>Add to playlist ›</div>
    <div class="ctx-sub-menu" id="ctxSubMenu"></div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════════════════
   MUSE  v3.0
   - Accounts (register/login/logout, JWT token auth)
   - Artist search + full artist profile page
   - Queue: clicking a song plays ONLY that track (no auto-fill)
   - Recommendations: per-account, based on full listen history
   - Queue stops when empty (no auto-continue)
   - Thumbnails fixed for all endpoints
══════════════════════════════════════════════════════════ */
const VERSION = '3.0';
const params  = new URLSearchParams(window.location.search);
// Server URL: ?server=URL → localStorage → ask user on screen
function getBase() {
  const p = params.get('server');
  if (p) { localStorage.setItem('muse_server', p.replace(/\/$/, '')); return p.replace(/\/$/, ''); }
  const s = localStorage.getItem('muse_server');
  if (s) return s.replace(/\/$/, '');
  return null;
}
let BASE = getBase();
const AUDIO   = document.getElementById('globalAudio');

/* ── Persistent auth token ── */
let authToken = localStorage.getItem('muse_token') || null;
let authUser  = JSON.parse(localStorage.getItem('muse_user') || 'null');

/* ── State ── */
const S = {
  serverOk:false, authOk:!!authToken, serverChecked:false, serverVer:'?',
  theme: localStorage.getItem('muse_theme') || 'dark',
  view:'home', filter:'songs',
  showQueue:false,
  results:[], artists:[], searching:false, lastQ:'',
  charts:[], chartsSource:'', chartsLoading:false,
  queue:[], queueIdx:-1,
  cur:null, playing:false, prog:0, duration:0, loadingAudio:false,
  vol: parseFloat(localStorage.getItem('muse_vol') || '75'),
  muted:false, shuffle:false, repeat:false,
  library:[], playlists:[], activePL:null,
  artistData:null, artistLoading:false,
  modal:null, addToPLVid:null, newPLName:'',
  recs:[], recsLoading:false,
  listenHistory:[],
  authMode:'login',   // login | register
  authError:'',
};

const TR = {};
function regTrack(t) { if (t?.videoId) TR[t.videoId] = t; return t; }
function getTrack(vid) { return TR[vid] || null; }
function storeList(list) { (list||[]).forEach(regTrack); return list||[]; }
let CTX = { vid: null };

/* ── API ── */
function authHeaders() {
  const h = {'Content-Type':'application/json'};
  if (authToken) h['X-Auth-Token'] = authToken;
  return h;
}
async function api(path, opts={}) {
  const res  = await fetch(BASE + path, { ...opts, headers: { ...authHeaders(), ...(opts.headers||{}) } });
  const text = await res.text();
  if (!res.ok) throw new Error(`${res.status}: ${text}`);
  try { return JSON.parse(text); } catch { return {}; }
}
const GET  = p    => api(p);
const POST = (p,b) => api(p, {method:'POST', body:JSON.stringify(b)});
const DEL  = p    => api(p, {method:'DELETE'});

/* ── Audio ── */
AUDIO.volume = S.vol / 100;
AUDIO.addEventListener('timeupdate', () => {
  if (!AUDIO.duration) return;
  S.prog = AUDIO.currentTime / AUDIO.duration;
  const f=document.getElementById('pFill'), n=document.getElementById('pNow');
  if (f) f.style.width=(S.prog*100)+'%';
  if (n) n.textContent=fmtT(Math.floor(AUDIO.currentTime));
});
AUDIO.addEventListener('ended', () => {
  if (S.repeat) { AUDIO.currentTime=0; AUDIO.play(); return; }
  nextTrack();
});
AUDIO.addEventListener('durationchange', () => {
  S.duration=Math.floor(AUDIO.duration);
  const el=document.getElementById('pTot'); if(el) el.textContent=fmtT(S.duration);
});
AUDIO.addEventListener('playing', () => {
  S.loadingAudio=false; S.playing=true;
  const b=document.getElementById('playBtn'); if(b) b.innerHTML=pauseIcon();
});
AUDIO.addEventListener('pause', () => {
  S.playing=false;
  const b=document.getElementById('playBtn'); if(b) b.innerHTML=playIcon();
});
AUDIO.addEventListener('error', () => {
  S.loadingAudio=false; S.playing=false;
  toast('Audio error — track unavailable'); render();
});
AUDIO.addEventListener('waiting', () => {
  S.loadingAudio=true;
  const b=document.getElementById('playBtn');
  if(b) b.innerHTML=`<div class="spin" style="width:12px;height:12px;border-width:2px;border-top-color:var(--bg)"></div>`;
});
const playIcon  = () => `<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>`;
const pauseIcon = () => `<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`;

/* ══════════════════════════════════════════════════════════  RENDER  */
function render() {
  document.documentElement.className = S.theme==='light' ? 'light' : '';
  document.getElementById('root').innerHTML = frame();
}
const re = () => { render(); attachSearchEvents(); };

const frame = () => `
  <div style="display:flex;flex-direction:column;height:100vh">
    <div class="shell">
      ${sidebar()}
      <div class="main">
        ${topbar()}
        <div style="display:flex;flex:1;min-height:0;overflow:hidden">
          <div class="scroll">${content()}</div>
          ${queuePanel()}
        </div>
      </div>
    </div>
    ${playerBar()}
    ${S.modal ? modals() : ''}
  </div>`;

/* ── SIDEBAR ── */
const sidebar = () => `
  <div class="side">
    <div class="brand">
      <div class="brand-left">
        <span class="brand-name">Muse</span>
        <span class="brand-ver">v${VERSION} · server v${S.serverVer}</span>
      </div>
      <div class="brand-dot ${S.serverOk?'ok':''}" title="${S.serverOk?'Connected':'Offline'}"></div>
    </div>
    <div class="nav">
      <div class="ngrp">
        <div class="nlbl">Browse</div>
        ${ni('home','Charts')}
        ${ni('recommended','For You')}
        ${ni('search','Search')}
        ${S.authOk ? ni('library','My Library') : ''}
      </div>
      <div class="ngrp">
        <div class="nlbl">Playlists <button onclick="S.authOk?openModal('newpl'):openModal('auth')">+</button></div>
        ${!S.authOk
          ? `<div style="padding:4px 10px;font-size:12px;color:var(--tx3)">Log in to see playlists</div>`
          : S.playlists.length===0
            ? `<div style="padding:4px 10px;font-size:12px;color:var(--tx3)">No playlists</div>`
            : S.playlists.map(p=>`
                <button class="nitem ${S.view==='playlist'&&S.activePL===p.id?'active':''}"
                  onclick="loadPlaylist(${p.id},'${esc(p.name)}')">${esc(p.name)}</button>`).join('')}
      </div>
    </div>
  </div>`;
const ni = (v,lbl) => `<button class="nitem ${S.view===v&&S.view!=='playlist'&&S.view!=='artist'?'active':''}" onclick="setView('${v}')">${lbl}</button>`;

/* ── TOPBAR ── */
const topbar = () => `
  <div class="topbar">
    <div class="search-form" id="searchForm">
      <input class="search-input" id="searchInput" type="text" placeholder="Search music, artists…"
        autocomplete="off" value="${esc(S.lastQ)}">
      <button class="search-go" onclick="submitSearch()">Search</button>
      <div class="ac" id="acDropdown"></div>
    </div>
    <div class="filter-tabs">
      ${['songs','artists'].map(f=>`<button class="ftab ${S.filter===f?'on':''}" onclick="setFilter('${f}')">${f[0].toUpperCase()+f.slice(1)}</button>`).join('')}
    </div>
    <button class="tbtn" onclick="S.showQueue=!S.showQueue;re()">Queue</button>
    <button class="tbtn" onclick="toggleTheme()">${S.theme==='dark'?'Light':'Dark'}</button>
    ${S.authOk
      ? `<button class="user-btn" onclick="openModal('user')">
           <div class="user-avatar">${(authUser?.username||'?')[0].toUpperCase()}</div>
           ${esc(authUser?.username||'Account')}
         </button>`
      : `<button class="tbtn" onclick="openModal('auth')">Log in</button>`}
  </div>`;

function attachSearchEvents() {
  const inp = document.getElementById('searchInput');
  const ac  = document.getElementById('acDropdown');
  if (!inp || !ac) return;
  let sugTimer;
  inp.addEventListener('input', () => {
    clearTimeout(sugTimer);
    const val = inp.value;
    if (val.length < 2) { ac.classList.remove('show'); return; }
    sugTimer = setTimeout(async () => {
      try {
        const d = await GET(`/suggestions?q=${encodeURIComponent(val)}`);
        const sugs = d.suggestions||[];
        if (!sugs.length) { ac.classList.remove('show'); return; }
        ac.innerHTML = sugs.map(s=>`<div class="ac-item" onmousedown="event.preventDefault();pickSug('${esc(s)}')">${esc(s)}</div>`).join('');
        ac.classList.add('show');
      } catch { ac.classList.remove('show'); }
    }, 250);
  });
  inp.addEventListener('keydown', e => {
    if (e.key==='Enter') { ac.classList.remove('show'); submitSearch(); }
    if (e.key==='Escape') ac.classList.remove('show');
  });
  inp.addEventListener('blur', () => setTimeout(()=>ac.classList.remove('show'),150));
}
function pickSug(s) { const i=document.getElementById('searchInput'); if(i) i.value=s; document.getElementById('acDropdown')?.classList.remove('show'); S.lastQ=s; doSearch(s); }
function submitSearch() { const i=document.getElementById('searchInput'); const q=(i?i.value:S.lastQ).trim(); if(q){S.lastQ=q;doSearch(q);} }

/* ── CONTENT ── */
function content() {
  if (!S.serverChecked) return `<div class="ld"><div class="spin"></div>Connecting to server…</div>`;
  if (!S.serverOk)      return serverBanner();
  if (S.view==='artist')     return artistView();
  if (S.view==='playlist')   { const pl=S.playlists.find(p=>p.id===S.activePL); return pl?plView(pl):''; }
  if (S.view==='recommended') return recsView();
  if (S.view==='search')     return searchView();
  if (S.view==='library')    return libView();
  return homeView();
}

/* ── HOME ── */
const homeView = () => `
  <div class="pad">
    <div class="sh"><span class="st">Charts</span><span class="sm">${S.chartsSource||'YouTube Music'}</span></div>
    ${S.chartsLoading
      ? `<div class="ld" style="padding:28px 0"><div class="spin"></div>Loading charts…</div>`
      : S.charts.length
        ? `<div class="grid">${S.charts.map((t,i)=>gcard(t,i)).join('')}</div>`
        : `<div class="empty"><div class="empty-t">No charts</div></div>`}
  </div>`;

/* ── SEARCH ── */
function searchView() {
  if (S.searching) return `<div class="ld"><div class="spin"></div>Searching…</div>`;

  if (S.filter==='artists') {
    if (!S.artists.length) return `<div class="empty"><div class="empty-t">${S.lastQ?'No artists found':'Search for artists'}</div></div>`;
    return `<div class="pad">
      <div class="sh"><span class="st">Artists</span><span class="sm">${S.artists.length} results · "${esc(S.lastQ)}"</span></div>
      <div class="grid">${S.artists.map(a=>artistCard(a)).join('')}
      </div></div>`;
  }

  if (!S.results.length) return `<div class="empty"><div class="empty-t">${S.lastQ?'No results':'Search for music'}</div><div class="empty-s">Type above and press Search</div></div>`;
  return `<div class="pad">
    <div class="sh"><span class="st">Results</span><span class="sm">${S.results.length} tracks · "${esc(S.lastQ)}"</span></div>
    <div class="tlist">${S.results.map((t,i)=>trow(t,i+1)).join('')}</div>
  </div>`;
}

/* ── FOR YOU ── */
const recsView = () => {
  if (!S.authOk) return `<div class="empty"><div class="empty-t">Log in for personalized recommendations</div><div class="empty-s"><button class="btn p" onclick="openModal('auth')" style="margin-top:12px">Log in</button></div></div>`;
  if (S.recsLoading) return `<div class="ld"><div class="spin"></div>Building your recommendations…</div>`;
  if (!S.listenHistory.length) return `<div class="empty"><div class="empty-t">Nothing here yet</div><div class="empty-s">Play some songs — we'll recommend more based on your listening history</div></div>`;
  if (!S.recs.length) return `<div class="empty"><div class="empty-t">Loading…</div></div>`;
  return `<div class="pad">
    <div class="sh"><span class="st">For You</span><span class="sm">Based on ${S.listenHistory.length} tracks you've listened to</span></div>
    <div class="grid">${S.recs.map((t,i)=>gcard(t,i,true)).join('')}</div>
  </div>`;
};

/* ── LIBRARY ── */
const libView = () => `<div class="pad">
  <div class="sh"><span class="st">Library</span><span class="sm">${S.library.length} saved</span></div>
  ${S.library.length
    ? `<div class="tlist">${S.library.map((t,i)=>trow(t,i+1,true)).join('')}</div>`
    : `<div class="empty"><div class="empty-t">Nothing saved</div><div class="empty-s">Right-click any track → Save to library</div></div>`}
</div>`;

/* ── ARTIST PAGE ── */
function artistView() {
  if (S.artistLoading) return `<div class="ld"><div class="spin"></div>Loading artist…</div>`;
  const a = S.artistData;
  if (!a) return `<div class="empty"><div class="empty-t">Artist not found</div></div>`;

  const bg = a.thumbnail ? `background-image:url('${esc(a.thumbnail)}')` : '';
  return `
    <div class="artist-hero">
      <div class="artist-hero-bg" style="${bg}"></div>
      <div class="artist-hero-overlay"></div>
      <div class="artist-hero-info">
        <div class="artist-avatar">${a.thumbnail?`<img src="${esc(a.thumbnail)}" onerror="this.style.display='none'">`:''}
        </div>
        <div class="artist-meta">
          <div class="artist-label">Artist</div>
          <div class="artist-name">${esc(a.name)}</div>
          <div class="artist-subs">${a.subscribers||a.views||''}</div>
          <div class="artist-btns">
            ${a.topSongs?.length ? `<button class="btn p" onclick="playArtistTop()">Play</button>` : ''}
            <button class="btn" onclick="setView('home')">Back</button>
          </div>
        </div>
      </div>
    </div>
    <div class="artist-body">
      ${a.topSongs?.length ? `
        <div class="artist-section">
          <div class="sh"><span class="st">Top Songs</span></div>
          <div class="tlist">${a.topSongs.map((t,i)=>trow(t,i+1)).join('')}</div>
        </div>` : ''}
      ${a.albums?.length ? `
        <div class="artist-section">
          <div class="sh"><span class="st">Albums</span></div>
          <div class="album-grid">${a.albums.map(al=>`
            <div class="album-card" onclick="playAlbum('${esc(al.playlistId||al.browseId)}')">
              <div class="album-art">${al.thumbnail?`<img src="${esc(al.thumbnail)}" loading="lazy" onerror="this.parentElement.innerHTML=''">`:''}
              </div>
              <div class="album-title">${esc(al.title)}</div>
              <div class="album-year">${al.year||''}</div>
            </div>`).join('')}
          </div>
        </div>` : ''}
      ${a.singles?.length ? `
        <div class="artist-section">
          <div class="sh"><span class="st">Singles</span></div>
          <div class="album-grid">${a.singles.map(s=>`
            <div class="album-card" onclick="playAlbum('${esc(s.playlistId||s.browseId)}')">
              <div class="album-art">${s.thumbnail?`<img src="${esc(s.thumbnail)}" loading="lazy" onerror="this.parentElement.innerHTML=''">`:''}
              </div>
              <div class="album-title">${esc(s.title)}</div>
              <div class="album-year">${s.year||''}</div>
            </div>`).join('')}
          </div>
        </div>` : ''}
      ${a.related?.length ? `
        <div class="artist-section">
          <div class="sh"><span class="st">Similar Artists</span></div>
          <div class="related-grid">${a.related.map(r=>`
            <div class="rel-card" onclick="openArtist('${esc(r.browseId)}')">
              <div class="rel-art">${r.thumbnail?`<img src="${esc(r.thumbnail)}" loading="lazy" onerror="this.parentElement.innerHTML=''">`:''}
              </div>
              <div class="rel-name">${esc(r.name)}</div>
            </div>`).join('')}
          </div>
        </div>` : ''}
    </div>`;
}

/* ── PLAYLIST VIEW ── */
const NOTE_SVG = `<svg width="38" height="38" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/></svg>`;
function plCover(pl) {
  const th = pl.tracks?.find(t=>t&&t.thumbnail)?.thumbnail;
  return th ? `<img src="${esc(th)}" loading="lazy">` : `<div class="pl-symbol" style="color:var(--tx2)">${NOTE_SVG}</div>`;
}
function plView(pl) { return `<div class="pad">
  <div class="plhd">
    <div class="plcover">${plCover(pl)}</div>
    <div>
      <div class="pllabel">Playlist</div>
      <div class="plbig">${esc(pl.name)}</div>
      <div class="plct">${(pl.tracks||[]).length} track${(pl.tracks||[]).length!==1?'s':''}</div>
      <div class="plbtns">
        <button class="btn p" onclick="playPlaylist(${pl.id})">Play</button>
        <button class="btn" onclick="setView('search')">+ Add Songs</button>
        <button class="btn" onclick="deletePlaylist(${pl.id})">Delete</button>
        <button class="btn" onclick="setView('home')">Back</button>
      </div>
    </div>
  </div>
  ${(pl.tracks||[]).length
    ? `<div class="tlist" style="margin-top:0">${pl.tracks.map((t,i)=>trow(t,i+1)).join('')}</div>`
    : `<div class="empty" style="padding:44px 0"><div class="empty-t">Empty playlist</div><div class="empty-s">Search for songs and right-click → Add to playlist</div></div>`}
</div>`; }

/* ── CARDS ── */
const gcard = (t, i, isRec=false) => `
  <div class="gcard" onclick="${isRec?`playFromRecs(${i})`:`playFromCharts(${i})`}" oncontextmenu="showCtx(event,'${esc(t.videoId)}')">
    <div class="gcart">
      ${t.thumbnail?`<img src="${esc(t.thumbnail)}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=gcph></div>'">`:`<div class="gcph"></div>`}
      ${!isRec?`<div class="gcrank">#${t.rank||i+1}</div>`:''}
    </div>
    <div class="gcname">${esc(t.title)}</div>
    <div class="gcartist">${esc(t.artist)}</div>
  </div>`;

const artistCard = a => `
  <div class="gcard" onclick="openArtist('${esc(a.browseId)}')">
    <div class="gcart round">
      ${a.thumbnail?`<img src="${esc(a.thumbnail)}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=gcph></div>'">`:`<div class="gcph"></div>`}
    </div>
    <div class="gcname">${esc(a.name)}</div>
    <div class="gcartist">${a.subscribers||'Artist'}</div>
  </div>`;

/* ── TRACK ROW ── */
function trow(t, num, inLib=false) {
  regTrack(t);
  const playing = S.cur?.videoId===t.videoId && S.playing;
  const art = t.thumbnail ? `<img src="${esc(t.thumbnail)}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=tartph></div>'">` : `<div class="tartph"></div>`;
  return `
    <div class="trow ${playing?'now':''}" onclick="playSingle('${esc(t.videoId)}')" oncontextmenu="showCtx(event,'${esc(t.videoId)}')">
      <div style="display:flex;align-items:center;justify-content:center;width:40px">
        <span class="tidx">${num}</span>
        <div class="twave">${'<div class="wb"></div>'.repeat(4)}</div>
      </div>
      <div class="tart">${art}</div>
      <div class="tinfo">
        <div class="tname">${esc(t.title)}</div>
        <div class="tartist">${esc(t.artist)}${t.album?' — '+esc(t.album):''}</div>
      </div>
      <div class="tdur">${t.duration||'--:--'}</div>
    </div>`;
}

/* ── QUEUE PANEL ── */
const queuePanel = () => `
  <div class="queue-panel ${S.showQueue?'':'hidden'}">
    <div class="qhead">
      <span>Up Next · ${S.queue.length}</span>
      ${S.queue.length?`<button class="qclear" onclick="clearQueue()">Clear</button>`:''}
    </div>
    <div class="qlist">
      ${S.queue.length===0
        ? `<div style="padding:18px 14px;font-size:12px;color:var(--tx3)">Queue empty</div>`
        : S.queue.map((t,i)=>`
            <div class="qitem ${i===S.queueIdx?'now':''}" onclick="jumpQueue(${i})" oncontextmenu="showCtx(event,'${esc(t.videoId)}')">
              <div class="qart">${t.thumbnail?`<img src="${esc(t.thumbnail)}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=qaph></div>'">`:`<div class="qaph"></div>`}</div>
              <div class="qinfo"><div class="qtitle">${esc(t.title)}</div><div class="qartist">${esc(t.artist)}</div></div>
            </div>`).join('')}
    </div>
  </div>`;

/* ── PLAYER ── */
const playerBar = () => {
  const t=S.cur;
  const art=t?.thumbnail?`<img src="${esc(t.thumbnail)}" onerror="this.parentElement.innerHTML='<div class=partph></div>'">`:`<div class="partph"></div>`;
  return `<div class="player">
    <div class="part">${art}</div>
    <div class="pinfo">
      <div class="pname ${S.loadingAudio?'pname-loading':''}">${t?(S.loadingAudio?'Loading…':esc(t.title)):'—'}</div>
      <div class="partist">${t?esc(t.artist):'—'}</div>
    </div>
    <div class="pctrl">
      <div class="pbtns">
        <button class="pbtn ${S.shuffle?'on':''}" onclick="toggleShuffle()" title="Shuffle">

        <button class="pplay" id="playBtn" onclick="togglePlay()">${S.playing?pauseIcon():playIcon()}</button>

      </div>
    </div>
    <div class="vrow">
      <svg class="vico" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" onclick="toggleMute()">
        ${S.muted||S.vol===0
          ?`<path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>`
          :S.vol<50
            ?`<path d="M18.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM5 9v6h4l5 5V4L9 9H5z"/>`
            :`<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>`}

      </div>

function showCtx(e, vid) {

  const t=getTrack(vid), menu=document.getElementById('ctxMenu'), ti=document.getElementById('ctxTitle'), sub=document.getElementById('ctxSubMenu');

}
function hideCtx() { document.getElementById('ctxMenu')?.classList.remove('show'); }
function ctxPlay()     { if(!CTX.vid)return; hideCtx(); playSingle(CTX.vid); }
function ctxPlayNext() { if(!CTX.vid)return; hideCtx(); playNext(CTX.vid); }
function ctxAddQueue() { if(!CTX.vid)return; hideCtx(); addToQueue(CTX.vid); }
function ctxSave()     { if(!CTX.vid)return; hideCtx(); saveTrack(CTX.vid); }
document.addEventListener('click', hideCtx);
document.addEventListener('contextmenu', e=>{ if(!e.target.closest('.gcard,.trow,.qitem')) hideCtx(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape'){hideCtx();closeModal();} });

/* ══════════════════════════════════════════════════════════  AUTH */
async function submitAuth() {
  S.authError='';
  const email = document.getElementById('authEmail')?.value?.trim();
  const pw    = document.getElementById('authPw')?.value?.trim();
  if (!email||!pw) { S.authError='Please fill in all fields'; re(); return; }

  try {
    if (S.authMode==='register') {
      const username = document.getElementById('authUser')?.value?.trim();
      if (!username) { S.authError='Username required'; re(); return; }
      await POST('/auth/register', {username, email, password:pw});
      // Auto-login after register
      S.authMode='login';
    }
    const d = await POST('/auth/login', {email, password:pw});
    authToken = d.token;
    authUser  = {username:d.username, email, userId:d.userId};
    localStorage.setItem('muse_token', authToken);
    localStorage.setItem('muse_user', JSON.stringify(authUser));
    S.authOk=true; S.modal=null; S.authError='';
    re();
    toast(`Welcome, ${authUser.username}`);
    loadUserData();
  } catch(e) {
    S.authError = e.message.includes('401') ? 'Invalid email or password'
                : e.message.includes('409') ? 'Email or username already taken'
                : e.message;
    re();
  }
}

async function doLogout() {
  try { await POST('/auth/logout', {}); } catch {}
  authToken=null; authUser=null;
  localStorage.removeItem('muse_token'); localStorage.removeItem('muse_user');
  S.authOk=false; S.modal=null; S.playlists=[]; S.library=[]; S.recs=[]; S.listenHistory=[];
  re(); toast('Logged out');
}

/* ══════════════════════════════════════════════════════════  ACTIONS */
function setView(v)    { S.view=v; S.activePL=null; S.artistData=null; re(); }
function setFilter(f)  { S.filter=f; re(); }
function toggleTheme() { S.theme=S.theme==='dark'?'light':'dark'; localStorage.setItem('muse_theme',S.theme); re(); }
function openModal(m)  { S.modal=m; S.authError=''; S.newPLName=''; re(); setTimeout(()=>document.getElementById(m==='auth'?'authEmail':m==='newpl'?'pli':null)?.focus(),60); }
function closeModal()  { S.modal=null; re(); }

function findAny(vid) { return getTrack(vid)||[...S.results,...S.library,...S.charts,...S.queue,...S.recs,...(S.artistData?.topSongs||[]),...S.playlists.flatMap(p=>p.tracks||[])].find(t=>t&&t.videoId===vid)||null; }

/* ── Search ── */
async function doSearch(q) {
  if (!q||!S.serverOk) return;
  S.view='search'; S.activePL=null; S.searching=true; S.results=[]; S.artists=[]; re();
  try {
    const d = await GET(`/search?q=${encodeURIComponent(q)}&filter=${encodeURIComponent(S.filter)}&limit=30`);
    if (S.filter==='artists') S.artists = d.artists||[];
    else S.results = storeList((d.tracks||[]).filter(t=>t&&t.videoId));
  } catch(e) { toast('Search error: '+e.message); }
  S.searching=false; re();
  const inp=document.getElementById('searchInput'); if(inp) inp.value=q;
}

/* ── Charts ── */
async function loadCharts() {
  S.chartsLoading=true; re();
  try {
    const d=await GET('/charts');
    S.charts=storeList((d.tracks||[]).filter(t=>t&&t.videoId));
    S.chartsSource=d.source||'YouTube Music';
  } catch(e) { toast('Charts: '+e.message); S.charts=[]; }
  S.chartsLoading=false; re();
}

/* ── Artist ── */
async function openArtist(browseId) {
  S.view='artist'; S.artistLoading=true; S.artistData=null; re();
  try {
    const d=await GET(`/artist/${encodeURIComponent(browseId)}`);
    S.artistData=d;
    storeList(d.topSongs||[]);
  } catch(e) { toast('Artist load failed: '+e.message); }
  S.artistLoading=false; re();
}
function playArtistTop() {
  const songs=S.artistData?.topSongs;
  if (songs?.length) { S.queue=[...songs]; S.queueIdx=0; startTrack(songs[0]); }
}
async function playAlbum(playlistId) {
  if (!playlistId) return;
  try {
    const d=await GET(`/playlist/${encodeURIComponent(playlistId)}`);
    const tracks=storeList((d.tracks||[]).filter(t=>t&&t.videoId));
    if (tracks.length) { S.queue=[...tracks]; S.queueIdx=0; startTrack(tracks[0]); }
  } catch(e) { toast('Album: '+e.message); }
}

/* ── Library ── */
async function loadLibrary() {
  try {
    const d=await GET('/user/history');
    const hist = d.history||[];
    // Populate in-memory listenHistory from DB so "For You" count is accurate
    S.listenHistory = hist.map(h=>h.video_id).filter(Boolean);
    // Library = recently played (saved tracks)
    S.library = storeList(hist.map(h=>({videoId:h.video_id,title:h.title,artist:h.artist,thumbnail:h.thumbnail})));
  } catch(e) { console.warn('[library]', e.message); }
}

/* ── Playlists ── */
async function loadPlaylists() {
  try {
    const d=await GET('/user/playlists');
    S.playlists=(d.playlists||[]).map(p=>({...p,tracks:(p.tracks||[]).map(t=>({videoId:t.video_id,title:t.title,artist:t.artist,thumbnail:t.thumbnail,duration:t.duration}))}));
    storeList(S.playlists.flatMap(p=>p.tracks));
    re();
  } catch(e) { console.warn('[playlists]',e.message); }
}

async function loadPlaylist(id, name) {
  S.view='playlist'; S.activePL=id; re();
  await loadPlaylists();
}

function playPlaylist(id) {
  const pl=S.playlists.find(p=>p.id===id);
  if (pl?.tracks?.length) { S.queue=[...pl.tracks]; S.queueIdx=0; startTrack(pl.tracks[0]); }
}

async function deletePlaylist(id) {
  try { await DEL(`/user/playlists/${id}`); toast('Playlist deleted'); await loadPlaylists(); setView('home'); } catch(e) { toast('Delete failed: '+e.message); }
}

function saveTrack(vid) {
  const t=findAny(vid)||getTrack(vid); if(!t) return;
  if (S.library.some(l=>l.videoId===vid)) { toast('Already saved'); return; }
  S.library.unshift(t); regTrack(t); toast(`Saved — ${t.title}`); re();
}

async function createPL() {
  const name=(document.getElementById('pli')?.value||S.newPLName).trim(); if(!name) return;
  S.modal=null;
  if (!S.authOk) { toast('Log in to create playlists'); openModal('auth'); return; }
  try {
    await POST('/user/playlists/create',{name});
    toast(`"${name}" created`);
    await loadPlaylists();
  } catch(e) { toast('Error: '+e.message); }
}

async function addToPL(plId, vid) {
  const t=findAny(vid)||getTrack(vid); if(!t) return;
  if (!S.authOk) { openModal('auth'); return; }
  S.modal=null; CTX.vid=null; hideCtx();
  // Optimistic update
  const pl=S.playlists.find(p=>p.id===plId);
  if (pl&&!pl.tracks.some(x=>x.videoId===vid)) pl.tracks.push(t);
  try {
    await POST(`/user/playlists/${plId}/add`,{track:{videoId:t.videoId,title:t.title,artist:t.artist,thumbnail:t.thumbnail,duration:t.duration}});
    toast(`Added to "${pl?.name||'playlist'}"`);
  } catch(e) { toast('Add failed: '+e.message); }
  re();
}

function addToQueue(vid) { const t=findAny(vid)||getTrack(vid); if(!t) return; S.queue.push(regTrack(t)); toast(`+ Queue — ${t.title}`); re(); }
function clearQueue() { S.queue=[]; S.queueIdx=-1; toast('Queue cleared'); re(); }

function playNext(vid) {
  const t=findAny(vid)||getTrack(vid); if(!t) return;
  S.queue.splice(S.queueIdx+1,0,regTrack(t)); toast(`Playing next — ${t.title}`); re();
}

/* ── Recommendations ── */
async function refreshRecs() {
  if (!S.authOk) return;
  S.recsLoading=true;
  if (S.view==='recommended') re();
  try {
    const d=await POST('/user/recommend',{});
    S.recs=storeList((d.tracks||[]).filter(t=>t&&t.videoId));
    console.log(`[recs] ${S.recs.length} tracks from ${d.seedCount} seeds`);
  } catch(e) { console.warn('[recs]',e.message); }
  S.recsLoading=false;
  if (S.view==='recommended') re();
}

async function recordPlay(t) {
  if (!S.authOk||!t?.videoId) return;
  if (!S.listenHistory.includes(t.videoId)) S.listenHistory.unshift(t.videoId);
  if (S.listenHistory.length>50) S.listenHistory.pop();
  try { await POST('/user/history/add',{track:{videoId:t.videoId,title:t.title,artist:t.artist,thumbnail:t.thumbnail}}); }
  catch {}
  // Refresh recs in background every 3 plays
  if (S.listenHistory.length%3===0) refreshRecs();
}

function loadUserData() { loadPlaylists(); loadLibrary(); refreshRecs(); }

/* ══════════════════════════════════════════════════════════  PLAYBACK */
function playFromCharts(idx) { S.queue=[...S.charts]; S.queueIdx=idx; startTrack(S.charts[idx]); }
function playFromRecs(idx)   { S.queue=[...S.recs];   S.queueIdx=idx; startTrack(S.recs[idx]); }
function jumpQueue(idx)      { S.queueIdx=idx; startTrack(S.queue[idx]); }

/* FIXED: clicking a single track row plays only that track, no auto-fill */
function playSingle(vid) {
  const t=findAny(vid)||getTrack(vid); if(!t) return;
  // If already playing this track, just toggle
  if (S.cur?.videoId===vid) { togglePlay(); return; }
  // Put only this track in queue — YTM Up Next will extend it naturally
  S.queue=[t]; S.queueIdx=0; startTrack(t);
}

async function startTrack(t) {
  if (!t) return;
  AUDIO.pause(); AUDIO.src='';
  S.cur=t; S.playing=false; S.prog=0; S.duration=0; S.loadingAudio=true;
  re(); recordPlay(t);

  try {
    const info=await GET(`/stream/${encodeURIComponent(t.videoId)}`);
    if (info.error) throw new Error(info.error);
    if (!info.audioUrl) throw new Error('No audio URL');
    if (info.duration) { S.duration=info.duration; const el=document.getElementById('pTot'); if(el) el.textContent=fmtT(info.duration); }
    AUDIO.volume=S.muted?0:S.vol/100;
    AUDIO.src=info.audioUrl; AUDIO.load();
    AUDIO.play().catch(()=>{ S.loadingAudio=false; toast('Click play to start (browser blocked autoplay)'); re(); });

    // NOTE: We do NOT auto-fill the queue here.
    // The user controls the queue manually via right-click → Add to Queue or Play Next.
    // YTM Up Next is only used when the user explicitly opens an artist/album.

  } catch(e) {
    S.loadingAudio=false; S.playing=false;
    toast(`Can't play "${t.title}" — ${e.message}`); re();
  }
}

function togglePlay() {
  if (!S.cur) return;
  if (AUDIO.paused) AUDIO.play().catch(()=>{});
  else AUDIO.pause();
}

function prevTrack() { if(S.queueIdx>0){S.queueIdx--;startTrack(S.queue[S.queueIdx]);} }

/* FIXED: stop when queue is exhausted, don't auto-continue */
function nextTrack() {
  if (S.queueIdx<S.queue.length-1) { S.queueIdx++; startTrack(S.queue[S.queueIdx]); }
  else {
    // Queue empty — stop playback
    AUDIO.pause(); S.playing=false; re();
  }
}

function toggleShuffle() {
  S.shuffle=!S.shuffle;
  if (S.shuffle&&S.queue.length>1) {
    const cur=S.queue[S.queueIdx];
    const rest=S.queue.filter((_,i)=>i!==S.queueIdx).sort(()=>Math.random()-.5);
    S.queue=[cur,...rest]; S.queueIdx=0;
  }
  toast(S.shuffle?'Shuffle on':'Shuffle off'); re();
}
function toggleRepeat() { S.repeat=!S.repeat; toast(S.repeat?'Repeat on':'Repeat off'); re(); }
function toggleMute() {
  S.muted=!S.muted; AUDIO.volume=S.muted?0:S.vol/100;
  const f=document.getElementById('vFill'); if(f) f.style.width=(S.muted?0:S.vol)+'%'; re();
}

/* Drag seek */
let seekDragging=false;
function startSeek(ev) {
  seekDragging=true; applySeek(ev);
  const mv=e=>{if(seekDragging)applySeek(e);}, up=()=>{seekDragging=false;document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);};
  document.addEventListener('mousemove',mv); document.addEventListener('mouseup',up);
}
function applySeek(ev) {
  const bar=document.getElementById('pBar'); if(!bar) return;
  const r=bar.getBoundingClientRect(), pct=Math.max(0,Math.min(1,(ev.clientX-r.left)/r.width));
  S.prog=pct; if(AUDIO.duration) AUDIO.currentTime=pct*AUDIO.duration;
  const f=document.getElementById('pFill'),n=document.getElementById('pNow');
  if(f) f.style.width=(pct*100)+'%'; if(n) n.textContent=fmtT(Math.floor(pct*(AUDIO.duration||S.duration||0)));
}

/* Drag volume */
let volDragging=false;
function startVolDrag(ev) {
  volDragging=true; applyVol(ev);
  const mv=e=>{if(volDragging)applyVol(e);}, up=()=>{volDragging=false;document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);};
  document.addEventListener('mousemove',mv); document.addEventListener('mouseup',up);
}
function applyVol(ev) {
  const bar=document.getElementById('vBar'); if(!bar) return;
  const r=bar.getBoundingClientRect();
  S.vol=Math.round(Math.max(0,Math.min(100,(ev.clientX-r.left)/r.width*100)));
  S.muted=false; AUDIO.volume=S.vol/100; localStorage.setItem('muse_vol',S.vol);
  const f=document.getElementById('vFill'); if(f) f.style.width=S.vol+'%';
}

/* ── Utils ── */
function fmtT(s){s=Math.max(0,Math.floor(s));return`${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

let toastEl,toastTmr;
function toast(msg){if(toastEl)toastEl.remove();toastEl=document.createElement('div');toastEl.className='toast';toastEl.textContent=msg;document.body.appendChild(toastEl);clearTimeout(toastTmr);toastTmr=setTimeout(()=>{toastEl?.remove();toastEl=null;},2600);}

function saveServerUrl() {
  const inp = document.getElementById('srvInp');
  const url = (inp ? inp.value : '').trim();
  if (!url || !url.startsWith('http')) { toast('Please enter a valid URL starting with https://'); return; }
  BASE = url.replace(/\/$/, '');
  localStorage.setItem('muse_server', BASE);
  toast('Connecting…');
  S.serverChecked = false;
  boot();
}

/* ── Boot ── */
async function boot() {
  if (!BASE) { S.serverChecked=true; S.serverOk=false; re(); return; }
  re();
  try {
    const d=await GET('/ping');
    S.serverOk=true; S.authOk=!!authToken; S.serverChecked=true; S.serverVer=d.version||'?';
    re(); loadCharts();
    if (S.authOk) {
      loadUserData();   // loads library, playlists, and refreshes recs from DB
    }
  } catch {
    S.serverOk=false; S.serverChecked=true; re();
    setTimeout(boot,4000);
  }
}

boot();
</script>
